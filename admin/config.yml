backend:
  name: github
  repo: mtk-college/mtk-college-website
  branch: main
  base_url: https://mtk-college.by
  auth_endpoint: api/auth

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

locale: "ru"

site_url: https://mtk-college.by
display_url: https://mtk-college.by

collections:

  # ============================================================
  # 1. СТАТЫЧНЫЯ СТАРОНКІ (singleton-файлы, рэдагуюцца як форма)
  # ============================================================

  - name: "pages"
    label: "Старонкі сайта"
    files:

      - name: "about"
        label: "Аб каледжы"
        file: "content/pages/about.md"
        fields:
          - { label: "Тэкст місіі", name: "mission_text", widget: "markdown" }
          - { label: "Тэкст гісторыі", name: "history_text", widget: "markdown" }
          - label: "Цэннасці (3 блокі)"
            name: "values"
            widget: "list"
            min: 3
            max: 3
            fields:
              - { label: "Загаловак", name: "title", widget: "string" }
              - { label: "Тэкст", name: "text", widget: "text" }

      - name: "programs"
        label: "Навучанне"
        file: "content/pages/programs.md"
        fields:
          - { label: "Уступны тэкст", name: "intro_text", widget: "markdown" }
          - label: "Агульныя прадметы (для ўсіх груп)"
            name: "common_subjects"
            widget: "list"
            field: { label: "Назва прадмета", name: "subject", widget: "string" }
          - label: "Профільныя прадметы (залежаць ад групы)"
            name: "profile_subjects"
            widget: "list"
            fields:
              - { label: "Назва прадмета", name: "subject", widget: "string" }
              - { label: "Група", name: "group", widget: "string", hint: "напр. 'Група II — Катэхетыка'" }
          - label: "Групы навучання (звычайна 6)"
            name: "groups"
            widget: "list"
            fields:
              - { label: "Нумар і назва", name: "name", widget: "string", hint: "напр. 'Група I — Тэалогія'" }
              - { label: "Апісанне", name: "description", widget: "text" }

      - name: "admissions"
        label: "Абітурыентам"
        file: "content/pages/admissions.md"
        fields:
          - { label: "Уступны тэкст", name: "intro_text", widget: "markdown" }
          - label: "Бягучы набор"
            name: "current_intake"
            widget: "object"
            hint: "Гэты блок патрабуе абнаўлення штогод — даты новага набору"
            fields:
              - { label: "Тэкст пра рэгістрацыю", name: "registration_dates", widget: "string", hint: "напр. '25 чэрвеня — 20 жніўня 2026'" }
              - { label: "Тэкст пра экзамен", name: "exam_date", widget: "string", hint: "напр. '22 жніўня 2026, 10:00'" }
          - label: "Крокі паступлення"
            name: "steps"
            widget: "list"
            field: { label: "Крок", name: "step", widget: "string" }
          - label: "Дакументы для паступлення"
            name: "documents"
            widget: "list"
            field: { label: "Дакумент", name: "item", widget: "string" }
          - label: "Уступны экзамен (пункты)"
            name: "exam_items"
            widget: "list"
            field: { label: "Пункт", name: "item", widget: "string" }
          - { label: "Спасылка на онлайн-рэгістрацыю (бягучы год)", name: "registration_url", widget: "string", required: false, hint: "Абнаўляецца штогод. Канкрэтныя даты набору публікуюцца ў Навінах, не тут." }

      - name: "contacts"
        label: "Кантакты"
        file: "content/pages/contacts.md"
        fields:
          - { label: "Адрас", name: "address", widget: "string" }
          - { label: "Тэлефон", name: "phone", widget: "string" }
          - { label: "E-mail", name: "email", widget: "string" }
          - { label: "Шырата (для карты)", name: "map_lat", widget: "number", value_type: "float" }
          - { label: "Даўгата (для карты)", name: "map_lng", widget: "number", value_type: "float" }
          - { label: "Нататка пра адрас", name: "address_note", widget: "text", required: false, hint: "Кароткае тлумачэнне, для чаго служыць гэты адрас (заняткі, экзамен і г.д.)" }

  # ============================================================
  # 2. ВЫКЛАДЧЫКІ (адзін файл — адзін выкладчык)
  # ============================================================

  - name: "teachers"
    label: "Выкладчыкі"
    folder: "content/teachers"
    create: true
    identifier_field: "display_name"
    summary: "{{display_name}} — {{fields.subjects}}"
    fields:
      - { label: "Імя з тытулам", name: "display_name", widget: "string", hint: "напр. 'кс. д-р Яўген Вінтоў'" }
      - label: "Прадметы"
        name: "subjects"
        widget: "list"
        field: { label: "Прадмет", name: "subject", widget: "string" }
      - { label: "Фота", name: "photo", widget: "image", required: false, hint: "Квадратнае фота, мінімум 300×300px. Без фота паказваецца заглушка." }
      - { label: "Парадак сартавання", name: "order", widget: "number", required: false, default: 0 }

  # ============================================================
  # 3. НАВІНЫ (адкрыты раздзел)
  # ============================================================

  - name: "news"
    label: "Навіны"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{fields.url_slug}}"
    summary: "{{date}} — {{title}}"
    fields:
      - { label: "Дата публікацыі", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Загаловак", name: "title", widget: "string" }
      - { label: "Кароткая спасылка (лацінкай, праз злучок, напр. nabor-2027)", name: "url_slug", widget: "string", hint: "Будзе выкарыстана для адрасу старонкі: /news/гэта-значэнне.html. Пішыце лацінскімі літарамі праз злучок, без прабелаў і косых рысак." }
      - { label: "Кароткі анонс (паказваецца ў спісе навін, пад загалоўкам)", name: "excerpt", widget: "text", hint: "1-2 кароткія сказы. Будзе бачны на старонцы са спісам усіх навін, да адкрыцця артыкула." }
      - { label: "Тэкст", name: "body", widget: "markdown" }
      - { label: "Фота", name: "photo", widget: "image", required: false }

  # ============================================================
  # 4. ЗАКРЫТЫ РАЗДЗЕЛ "СТУДЭНТАМ"
  # ============================================================

  - name: "schedule"
    label: "Расклад заняткаў"
    folder: "content/students/schedule"
    create: true
    slug: "{{year}}-{{month}}-{{day}}"
    identifier_field: "date"
    summary: "{{date}} — {{fields.event_title}}"
    fields:
      - { label: "Дата", name: "date", widget: "date", format: "YYYY-MM-DD", hint: "Можна змяняць пры пераносе занятку на іншую суботу." }
      - label: "Тып дня"
        name: "type"
        widget: "select"
        options: [{ label: "Звычайны дзень заняткаў", value: "regular" }, { label: "Адметная падзея", value: "event" }]
        default: "regular"

      # --- поля для звычайнага дня ---
      - { label: "Імша (час + хто служыць)", name: "celebrant", widget: "string", required: false, hint: "Напр. '08:15–08:50 Імша — цэлебруе кс. ...'. Толькі для звычайнага дня." }
      - label: "Курсы і прадметы (толькі для звычайнага дня)"
        name: "courses"
        widget: "list"
        required: false
        fields:
          - { label: "Курс", name: "course", widget: "select", options: ["I курс", "II курс", "III курс"] }
          - { label: "1. 09:00–10:30", name: "slot1", widget: "string", required: false }
          - { label: "2. 10:45–12:15", name: "slot2", widget: "string", required: false }
          - { label: "3. 12:30–14:00", name: "slot3", widget: "string", required: false }
          - { label: "4. 14:15–15:45", name: "slot4", widget: "string", required: false }
          - { label: "5. 16:00–17:30", name: "slot5", widget: "string", required: false }

      # --- поля для адметнай падзеі ---
      - { label: "Назва падзеі (толькі для падзеі)", name: "event_title", widget: "string", required: false }
      - { label: "Час падзеі (свабодны фармат, толькі для падзеі)", name: "event_time", widget: "string", required: false, hint: "напр. '11:00–13:00' або 'удакладн.'" }
      - { label: "Апісанне падзеі", name: "event_description", widget: "text", required: false }
      - { label: "Для якога курса (пуста = для ўсіх)", name: "event_course", widget: "select", options: ["I курс", "II курс", "III курс"], required: false }

  - name: "announcements"
    label: "Аб'явы для студэнтаў"
    folder: "content/students/announcements"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{date}} — {{title}}"
    fields:
      - { label: "Дата", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Загаловак", name: "title", widget: "string" }
      - { label: "Тэкст", name: "body", widget: "markdown" }
      - { label: "Тэг курса (пуста = для ўсіх)", name: "course_tag", widget: "select", options: ["I курс", "II курс", "III курс"], required: false }

  - name: "library"
    label: "Бібліятэка"
    folder: "content/students/library"
    create: true
    summary: "{{title}} ({{category}})"
    fields:
      - { label: "Назва", name: "title", widget: "string" }
      - label: "Катэгорыя"
        name: "category"
        widget: "select"
        options: [{ label: "Агульныя матэрыялы", value: "general" }, { label: "Па прадметах", value: "subject" }]
      - { label: "Прадмет (толькі для катэгорыі 'Па прадметах')", name: "subject", widget: "string", required: false }
      - { label: "Падкатэгорыя", name: "subcategory", widget: "string", required: false, hint: "напр. 'Лекцыі' або 'Дадатковая літаратура'. Можна пакінуць пустым." }
      - label: "Тып матэрыялу"
        name: "material_type"
        widget: "select"
        options: [{ label: "Файл", value: "file" }, { label: "Спасылка", value: "link" }]
      - { label: "Файл (для тыпу 'Файл')", name: "file", widget: "file", required: false }
      - { label: "Спасылка (для тыпу 'Спасылка')", name: "url", widget: "string", required: false }

# ============================================================
# НАТАТКІ ПА НАЛАДЦЫ (не частка канфігурацыі Decap CMS)
# ============================================================
#
# 1. backend.repo і base_url ужо запоўнены сапраўднымі значэннямі
#    (mtk-college/mtk-college-website, mtk-college-website.pages.dev).
#    Калі дамен зменіцца (напр. на mtk-college.by), трэба абнавіць base_url.
#
# 2. OAuth для ўвахода ў CMS праз GitHub рэалізаваны праз свае ўласныя
#    Cloudflare Pages Functions: functions/api/auth.js і
#    functions/api/callback.js. Для іх працы патрэбна:
#    а) стварыць GitHub OAuth App (GitHub → Settings → Developer settings
#       → OAuth Apps → New OAuth App), з Homepage URL і Authorization
#       callback URL роўна "https://mtk-college-website.pages.dev/api/callback"
#    б) скапіяваць Client ID і Client Secret у Cloudflare Pages →
#       Settings → Environment variables як GITHUB_OAUTH_CLIENT_ID і
#       GITHUB_OAUTH_CLIENT_SECRET
#
# 3. Старонка ўвахода ў CMS: admin/index.html (ужо створана).
#    Адкрываецца па адрасе /admin/ на сайце.
#
# 4. Ужо існуючыя markdown-файлы з гэтай гутаркі (мтк-аб-каледжы.md,
#    мтк-навучанне.md, мтк-абітурыентам.md, мтк-навіны.md) ужо перанесены
#    у content/pages/*.md — глядзіце архіў mtk-cms-content.tar.gz.
#
# 5. ВАЖНА: бягучыя HTML-старонкі сайта (index.html, about.html і г.д.)
#    пакуль НЕ генеруюцца аўтаматычна з гэтых markdown-файлаў — гэта
#    асобная задача (патрэбны генератар статычных старонак). Да таго часу
#    змены праз CMS будуць захоўвацца ў рэпазіторыі, але не з'явяцца
#    самі на сайце без дадатковай налады.

